version: '3.9'

services:

  backend:

    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: backend

    ports:
      - "8000:8000"

  frontend:

    build:
      context: .
      dockerfile: Dockerfile.ui

    container_name: frontend

    ports:
      - "8501:8501"

    environment:
      API_URL: "http://backend:8000/predict"

    depends_on:
      - backend